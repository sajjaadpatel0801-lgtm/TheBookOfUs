<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Book Of Us ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
height:100vh;
background:url("cover.jpg") center center/cover no-repeat;
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
}

.content{
position:relative;
z-index:2;
text-align:center;
color:white;
padding:20px;
}

h1{
font-size:58px;
margin-bottom:20px;
text-shadow:0 0 15px black;
}

p{
font-size:24px;
line-height:1.8;
margin-bottom:40px;
text-shadow:0 0 10px black;
}

.button{
display:inline-block;
padding:18px 40px;
background:#ff2d75;
color:white;
text-decoration:none;
border-radius:50px;
font-size:22px;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.button:hover{
background:#ff0f64;
transform:scale(1.05);
}

@media(max-width:768px){

h1{
font-size:42px;
}

p{
font-size:18px;
}

.button{
font-size:18px;
padding:16px 30px;
}

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="content">

<h1>The Book Of Us ❤️</h1>

<p>

Every love story is beautiful

<br><br>

But ours is my favourite.

</p>

<a href="story.html" class="button">

Open Our Story ❤️

</a>

</div>

</body>

</html>
