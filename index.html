<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Book Of Us ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
height:100vh;
background:url("cover.jpg") center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.content{
position:relative;
z-index:2;
text-align:center;
color:white;
padding:20px;
}

h1{
font-size:60px;
margin-bottom:20px;
text-shadow:2px 2px 10px black;
}

p{
font-size:24px;
margin-bottom:40px;
text-shadow:2px 2px 10px black;
}

button{
padding:18px 45px;
font-size:24px;
border:none;
border-radius:50px;
background:#ff2d75;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff0f64;
transform:scale(1.05);
}

@media(max-width:768px){

h1{
font-size:42px;
}

p{
font-size:20px;
}

button{
font-size:20px;
padding:16px 36px;
}

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="content">

<h1>The Book Of Us ❤️</h1>

<p>Every love story is beautiful<br>but ours is my favourite.</p>

<button onclick="openStory()">
Open Our Story ❤️
</button>

</div>

<script src="script.js"></script>

</body>

</html>
