<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Jar ❤️</title>


<style>

body{
background:linear-gradient(135deg,#fff7fb,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
font-family:Georgia,serif;
}

.container{
max-width:850px;
width:100%;
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
text-align:center;
}

.jar{
font-size:90px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}

}

h1{
color:#ff2d75;
font-size:50px;
margin-bottom:10px;
}

.subtitle{
font-size:22px;
color:#666;
margin-bottom:40px;
}

#memory{
background:#fff6fa;
padding:35px;
border-radius:20px;
min-height:220px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
line-height:1.8;
transition:.5s;
}

.fade{
opacity:0;
}

button,a{

margin-top:30px;
padding:16px 35px;
border:none;
border-radius:50px;
background:#ff2d75;
color:white;
font-size:20px;
cursor:pointer;
text-decoration:none;
display:inline-block;
transition:.3s;

}

button:hover,
a:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="container">

<div class="jar">🫙</div>

<h1>Memory Jar ❤️</h1>

<p class="subtitle">
Every click opens another beautiful memory.
</p>

<div id="memory"></div>

<button onclick="nextMemory()">
❤️ Pick a Memory
</button>

<br>

<a href="ending.html">
Final Chapter ➜
</a>

</div>

<script src="memories.js"></script>

</body>

</html>
