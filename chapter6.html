<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Jar ❤️</title>

<style>

body{
background:linear-gradient(135deg,#fff7fb,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
font-family:Georgia,serif;
}

.container{
max-width:850px;
width:100%;
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
text-align:center;
}

h1{
color:#ff2d75;
font-size:50px;
margin-bottom:10px;
}

.subtitle{
font-size:22px;
color:#666;
margin-bottom:40px;
}

.jar-container{
display:flex;
flex-direction:column;
align-items:center;
margin:40px 0;
}

.jar{
font-size:120px;
animation:float 3s ease-in-out infinite;
z-index:2;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.note{
width:320px;
min-height:220px;
background:#fffdf7;
border-radius:20px;
padding:30px;
margin-top:-40px;
box-shadow:0 10px 25px rgba(0,0,0,.2);

transform:translateY(-140px) scale(.7);
opacity:0;

transition:.8s ease;

position:relative;
}

.note.show{
transform:translateY(0) scale(1);
opacity:1;
}

.paper-top{
width:90px;
height:18px;
background:#ffe0a8;
position:absolute;
top:-9px;
left:50%;
transform:translateX(-50%) rotate(-3deg);
border-radius:5px;
}

#memory{
font-size:26px;
line-height:1.8;
text-align:center;
color:#333;
}

button,a{
margin-top:30px;
padding:16px 35px;
border:none;
border-radius:50px;
background:#ff2d75;
color:white;
font-size:20px;
cursor:pointer;
text-decoration:none;
display:inline-block;
transition:.3s;
}

button:hover,
a:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>Memory Jar ❤️</h1>

<p class="subtitle">
Every click pulls another memory from the jar.
</p>

<div class="jar-container">

<div class="jar">🫙</div>

<div id="note" class="note">

<div class="paper-top"></div>

<p id="memory"></p>

</div>

</div>

<button onclick="nextMemory()">
❤️ Pick a Memory
</button>

<br>

<a href="ending.html">
Final Chapter ➜
</a>

</div>

<script src="memories.js"></script>

</body>

</html>
