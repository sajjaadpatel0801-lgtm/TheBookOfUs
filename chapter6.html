<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Jar ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
background:linear-gradient(135deg,#fff7fb,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
overflow-x:hidden;
}

.container{
max-width:900px;
width:100%;
background:white;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,.15);
}

h1{
font-size:50px;
color:#ff2d75;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
color:#666;
margin-bottom:35px;
}

.jar-area{
position:relative;
width:300px;
height:460px;
margin:auto;
}

.jar{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:220px;
animation:float 3s ease-in-out infinite;
}

.jar img{
width:100%;
display:block;
}

.note{
position:absolute;
left:50%;
bottom:120px;
transform:translateX(-50%) translateY(120px) scale(.6);
width:210px;
background:#fffdf8;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
opacity:0;
transition:.8s;
z-index:10;
}

.note.show{
opacity:1;
transform:translateX(-50%) translateY(-130px) scale(1);
}

.paper-top{
width:90px;
height:16px;
background:#ffe0a8;
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
border-radius:4px;
}

#memory{
font-size:19px;
line-height:1.7;
color:#333;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:50px;
background:#ff2d75;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.next{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:#ff2d75;
color:white;
text-decoration:none;
border-radius:50px;
font-size:20px;
transition:.3s;
}

.next:hover{
transform:scale(1.05);
}

.shake{
animation:shake .5s;
}

@keyframes shake{
0%{transform:translateX(-50%) rotate(0deg);}
25%{transform:translateX(-50%) rotate(-3deg);}
50%{transform:translateX(-50%) rotate(3deg);}
75%{transform:translateX(-50%) rotate(-2deg);}
100%{transform:translateX(-50%) rotate(0deg);}
}

@keyframes float{
0%{transform:translateX(-50%) translateY(0);}
50%{transform:translateX(-50%) translateY(-8px);}
100%{transform:translateX(-50%) translateY(0);}
}

.heart{
position:fixed;
font-size:28px;
pointer-events:none;
animation:floatHeart 2.5s linear forwards;
z-index:9999;
}

@keyframes floatHeart{
0%{
opacity:1;
transform:translateY(0) scale(.8);
}
100%{
opacity:0;
transform:translateY(-180px) scale(1.5);
}
}

.sparkle{
position:fixed;
font-size:22px;
pointer-events:none;
animation:sparkle 1.5s linear forwards;
z-index:9999;
}

@keyframes sparkle{
0%{
opacity:1;
transform:scale(.5);
}
100%{
opacity:0;
transform:translateY(-80px) scale(1.5);
}
}

@media(max-width:700px){

.container{
padding:25px;
}

h1{
font-size:38px;
}

.subtitle{
font-size:18px;
}

.jar{
width:180px;
}

.note{
width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Memory Jar ❤️</h1>

<p class="subtitle">
Every click pulls another beautiful memory from our jar.
</p>

<div class="jar-area">

<div id="note" class="note">

<div class="paper-top"></div>

<p id="memory"></p>

</div>

<div class="jar">

<img src="jar.png" alt="Memory Jar">

</div>

</div>

<button onclick="nextMemory()">
❤️ Pick a Memory
</button>

<br>

<a class="next" href="ending.html">
Final Chapter ➜
</a>

</div>

<script src="memories.js"></script>

</body>
</html>
