<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chapter Five ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
background:linear-gradient(135deg,#fff7fb,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.container{
max-width:850px;
width:100%;
background:white;
padding:50px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
text-align:center;
}

h1{
font-size:50px;
color:#ff2d75;
margin-bottom:10px;
}

h2{
color:#888;
margin-bottom:40px;
}

#counter{
font-size:22px;
color:#ff2d75;
margin-bottom:30px;
font-weight:bold;
}

#reason{
font-size:30px;
line-height:1.8;
min-height:220px;
display:flex;
justify-content:center;
align-items:center;
transition:.5s;
}

.fade{
opacity:0;
}

.buttons{
margin-top:40px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

button,
a{
background:#ff2d75;
color:white;
padding:15px 30px;
border:none;
border-radius:50px;
font-size:20px;
cursor:pointer;
text-decoration:none;
transition:.3s;
}

button:hover,
a:hover{
background:#ff0f64;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>Chapter Five ❤️</h1>

<h2>100 Reasons Why I Love You</h2>

<div id="counter"></div>

<div id="reason"></div>

<div class="buttons">

<button onclick="previousReason()">⬅ Previous</button>

<button onclick="nextReason()">❤️ Next Reason</button>

<a href="chapter6.html">Next Chapter ➜</a>

</div>

</div>

<script src="reasons.js"></script>
